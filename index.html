<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жимс Цуглуулах Тоглоом</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #3498db, #2980b9);
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Сагс */
        #basket {
            position: absolute;
            bottom: 20px;
            left: 350px;
            width: 100px;
            height: 20px;
            background: #2ecc71;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background 0.1s;
        }

        /* Унах зүйлс (Жимс, Бөмбөг) */
        .falling-object {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .fruit {
            background: #e74c3c; /* Улаан жимс */
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.3);
        }

        .bomb {
            background: #2c3e50; /* Хар бөмбөг */
            border: 2px solid #000;
            box-shadow: inset -3px -3px 5px rgba(255,255,255,0.2);
        }

        /* Онооны самбар */
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1.5;
        }

        /* Game Over дэлгэц */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #game-over-screen h1 {
            color: #e74c3c;
            font-size: 45px;
            margin-bottom: 10px;
        }

        #game-over-screen p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        #restart-btn {
            padding: 10px 25px;
            font-size: 18px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #restart-btn:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Оноо харах хэсэг -->
        <div id="ui">
            <div>Оноо: <span id="score">0</span></div>
            <div>Хурд: <span id="speed-level">1</span></div>
        </div>

        <!-- Сагс -->
        <div id="basket"></div>

        <!-- Game Over Дэлгэц -->
        <div id="game-over-screen">
            <h1>ТОГЛООМ ДУУСЛАА!</h1>
            <p>Таны эцсийн оноо: <span id="final-score">0</span></p>
            <button id="restart-btn" onclick="resetGame()">Дахин эхлэх</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const basket = document.getElementById('basket');
        const scoreDisplay = document.getElementById('score');
        const speedDisplay = document.getElementById('speed-level');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');

        // Тоглоомын анхны төлөвүүд
        let score = 0;
        let baseSpeed = 3;
        let currentSpeed = 3;
        let basketX = 350;
        const basketSpeed = 15;
        const containerWidth = 800;
        const basketWidth = 100;
        let objects = [];
        let gameInterval;
        let spawnInterval;
        let isGameOver = false;

        // Товчлуур даралтыг хянах
        let keys = { ArrowLeft: false, ArrowRight: false };

        document.addEventListener('keydown', (e) => {
            if (e.key in keys) keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key in keys) keys[e.key] = false;
        });

        // Сагсыг хөдөлгөх функц
        function moveBasket() {
            if (keys.ArrowLeft && basketX > 0) {
                basketX -= basketSpeed;
            }
            if (keys.ArrowRight && basketX < containerWidth - basketWidth) {
                basketX += basketSpeed;
            }
            basket.style.left = basketX + 'px';
        }

        // Шинэ жимс эсвэл бөмбөг үүсгэх
        function spawnObject() {
            if (isGameOver) return;

            const obj = document.createElement('div');
            obj.classList.add('falling-object');

            // 75% магадлалтай жимс, 25% магадлалтай бөмбөг
            const isFruit = Math.random() < 0.75;
            if (isFruit) {
                obj.classList.add('fruit');
                obj.dataset.type = 'fruit';
            } else {
                obj.classList.add('bomb');
                obj.dataset.type = 'bomb';
            }

            // Санамсаргүй X байрлал
            const xPos = Math.floor(Math.random() * (containerWidth - 30));
            obj.style.left = xPos + 'px';
            obj.style.top = '0px';

            container.appendChild(obj);
            objects.push({ element: obj, x: xPos, y: 0, type: obj.dataset.type });
        }

        // Тоглоомын үндсэн давталт (Үсрэлт, мөргөлдөөн шалгах)
        function updateGame() {
            if (isGameOver) return;

            moveBasket();

            // Оноо ахих тусам хурд нэмэгдэнэ (5 оноо тутамд хурд 1-ээр нэмэгдэнэ)
            currentSpeed = baseSpeed + Math.floor(score / 5);
            speedDisplay.innerText = (currentSpeed - baseSpeed + 1); // Түвшин хэлбэрээр харуулах

            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                obj.y += currentSpeed;
                obj.element.style.top = obj.y + 'px';

                // Сагстай мөргөлдөж байгааг шалгах
                // Сагсны Y байрлал: дээрээсээ 560px (600 - 20px зай - 20px өндөр)
                if (obj.y >= 540 && obj.y <= 560 && obj.x + 30 >= basketX && obj.x <= basketX + basketWidth) {
                    if (obj.type === 'fruit') {
                        score++;
                        scoreDisplay.innerText = score;
                    } else if (obj.type === 'bomb') {
                        endGame();
                        return;
                    }
                    obj.element.remove();
                    objects.splice(i, 1);
                    continue;
                }

                // Дэлгэцнээс гарсан зүйлсийг устгах
                if (obj.y > 600) {
                    obj.element.remove();
                    objects.splice(i, 1);
                }
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            finalScoreDisplay.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            // Хуучин зүйлсийг цэвэрлэх
            objects.forEach(obj => obj.element.remove());
            objects = [];
            score = 0;
            currentSpeed = baseSpeed;
            basketX = 350;
            isGameOver = false;

            scoreDisplay.innerText = score;
            speedDisplay.innerText = 1;
            gameOverScreen.style.display = 'none';

            // Дахин эхлүүлэх
            gameInterval = setInterval(updateGame, 1000 / 60); // 60 FPS
            spawnInterval = setInterval(spawnObject, 900); // 0.9 секунд тутамд унана
        }

        // Тоглоомыг шууд эхлүүлэх
        resetGame();
    </script>
</body>
</html>
