<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 Тоглогчтой Жимсний Тэмцexternal</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 900px; /* Талбайг арай томруулсан */
            height: 650px;
            background: linear-gradient(to bottom, #1f4068, #162447);
            border: 4px solid #e43f5a;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Тоглогч 1-ийн Сагс (A/D) */
        #basket1 {
            position: absolute;
            bottom: 20px;
            left: 200px;
            width: 100px;
            height: 22px;
            background: #4ecc71; /* Ногоон */
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(78, 204, 113, 0.4);
        }

        /* Тоглогч 2-ийн Сагс (Сумнууд) */
        #basket2 {
            position: absolute;
            bottom: 20px;
            left: 600px;
            width: 100px;
            height: 22px;
            background: #00adb5; /* Цэнхэр */
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0, 173, 181, 0.4);
        }

        /* Унах зүйлс */
        .falling-object {
            position: absolute;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        /* Улаан жимс (+1 оноо) */
        .fruit-red {
            background: #ff4757;
            box-shadow: inset -4px -4px 6px rgba(0,0,0,0.4);
        }

        /* Алтан жимс (+3 оноо) */
        .fruit-gold {
            background: #ffa502;
            border: 2px solid #fff;
            box-shadow: 0 0 12px #ffa502, inset -4px -4px 6px rgba(0,0,0,0.3);
        }

        /* Бөмбөг (Шууд хожигдоно) */
        .bomb {
            background: #2f3542;
            border: 2px solid #000;
            box-shadow: inset -4px -4px 6px rgba(255,255,255,0.2);
        }

        /* Онооны самбар */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            box-sizing: border-box;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            background: rgba(0, 0, 0, 0.2);
        }

        .p1-color { color: #4ecc71; }
        .p2-color { color: #00adb5; }

        /* Game Over дэлгэц */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 26, 0.9);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #winnerText {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        #reasonText {
            font-size: 18px;
            color: #a4b0be;
            margin-bottom: 30px;
        }

        .final-scores {
            display: flex;
            gap: 50px;
            font-size: 22px;
            margin-bottom: 35px;
        }

        #restart-btn {
            padding: 12px 30px;
            font-size: 18px;
            background: #e43f5a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        #restart-btn:hover {
            background: #ff4757;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Онооны хэсэг -->
        <div id="ui">
            <div class="p1-color">Тоглогч 1 (A/D): <span id="p1-score">0</span></div>
            <div>Түвшин: <span id="speed-level">1</span></div>
            <div class="p2-color">Тоглогч 2 (◀/▶): <span id="p2-score">0</span></div>
        </div>

        <!-- Сагснууд -->
        <div id="basket1"></div>
        <div id="basket2"></div>

        <!-- Game Over Дэлгэц -->
        <div id="game-over-screen">
            <div id="winnerText">ЯЛАГЧ ТОДОРЛОО!</div>
            <div id="reasonText">Бөмбөг дэлбэрлээ!</div>
            <div class="final-scores">
                <div class="p1-color">P1 Оноо: <span id="p1-final">0</span></div>
                <div class="p2-color">P2 Оноо: <span id="p2-final">0</span></div>
            </div>
            <button id="restart-btn" onclick="resetGame()">Дахин тоглох</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const basket1 = document.getElementById('basket1');
        const basket2 = document.getElementById('basket2');
        const p1ScoreDisplay = document.getElementById('p1-score');
        const p2ScoreDisplay = document.getElementById('p2-score');
        const speedDisplay = document.getElementById('speed-level');
        const gameOverScreen = document.getElementById('game-over-screen');
        const winnerText = document.getElementById('winnerText');
        const reasonText = document.getElementById('reasonText');
        const p1Final = document.getElementById('p1-final');
        const p2Final = document.getElementById('p2-final');

        // Тоглоомын тохиргоо
        let p1Score = 0;
        let p2Score = 0;
        let baseSpeed = 3.5;
        let currentSpeed = 3.5;
        
        let basket1X = 200;
        let basket2X = 600;
        const basketSpeed = 12;
        const containerWidth = 900;
        const basketWidth = 100;
        
        let objects = [];
        let gameInterval;
        let spawnInterval;
        let isGameOver = false;

        // Товчлуур хянах (A, D болон Сумнууд зэрэг ажиллана)
        let keys = {
            a: false, d: false,     // Player 1
            ArrowLeft: false, ArrowRight: false // Player 2
        };

        document.addEventListener('keydown', (e) => {
            let key = e.key;
            if (key === 'A' || key === 'a') keys.a = true;
            if (key === 'D' || key === 'd') keys.d = true;
            if (key in keys) keys[key] = true;
        });

        document.addEventListener('keyup', (e) => {
            let key = e.key;
            if (key === 'A' || key === 'a') keys.a = false;
            if (key === 'D' || key === 'd') keys.d = false;
            if (key in keys) keys[key] = false;
        });

        // Сагснуудыг хөдөлгөх
        function moveBaskets() {
            // Player 1 (A / D)
            if (keys.a && basket1X > 0) basket1X -= basketSpeed;
            if (keys.d && basket1X < containerWidth - basketWidth) basket1X += basketSpeed;
            basket1.style.left = basket1X + 'px';

            // Player 2 (ArrowLeft / ArrowRight)
            if (keys.ArrowLeft && basket2X > 0) basket2X -= basketSpeed;
            if (keys.ArrowRight && basket2X < containerWidth - basketWidth) basket2X += basketSpeed;
            basket2.style.left = basket2X + 'px';
        }

        // Шинэ зүйл үүсгэх (Жимс, Алтан жимс, Бөмбөг)
        function spawnObject() {
            if (isGameOver) return;

            const obj = document.createElement('div');
            obj.classList.add('falling-object');

            const rand = Math.random();
            let type = 'fruit-red';

            if (rand < 0.55) {
                type = 'fruit-red';    // 55% Улаан жимс
                obj.classList.add('fruit-red');
            } else if (rand < 0.75) {
                type = 'fruit-gold';   // 20% Алтан жимс
                obj.classList.add('fruit-gold');
            } else {
                type = 'bomb';         // 25% Бөмбөг
                obj.classList.add('bomb');
            }

            const xPos = Math.floor(Math.random() * (containerWidth - 32));
            obj.style.left = xPos + 'px';
            obj.style.top = '0px';

            container.appendChild(obj);
            objects.push({ element: obj, x: xPos, y: 0, type: type });
        }

        // Тоглоомын явцыг шинэчлэх
        function updateGame() {
            if (isGameOver) return;

            moveBaskets();

            // Хоёр тоглогчийн нийт онооноос хамаарч хурд нэмэгдэнэ
            let totalScore = p1Score + p2Score;
            currentSpeed = baseSpeed + Math.floor(totalScore / 6);
            speedDisplay.innerText = Math.floor(totalScore / 6) + 1;

            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                obj.y += currentSpeed;
                obj.element.style.top = obj.y + 'px';

                // Мөргөлтийн хайрцаг шалгах (Сагсны Y: 650 - 20 - 22 = 608px)
                if (obj.y >= 590 && obj.y <= 612) {
                    
                    // Player 1 Сагстай мөргөлдсөн эсэх
                    if (obj.x + 32 >= basket1X && obj.x <= basket1X + basketWidth) {
                        handleCatch('Player 1', obj.type);
                        obj.element.remove();
                        objects.splice(i, 1);
                        continue;
                    }
                    
                    // Player 2 Сагстай мөргөлдсөн эсэх
                    if (obj.x + 32 >= basket2X && obj.x <= basket2X + basketWidth) {
                        handleCatch('Player 2', obj.type);
                        obj.element.remove();
                        objects.splice(i, 1);
                        continue;
                    }
                }

                // Дэлгэцнээс доош гарвал устгах
                if (obj.y > 650) {
                    obj.element.remove();
                    objects.splice(i, 1);
                }
            }
        }

        // Жимс барих эсвэл бөмбөг авсныг шийдвэрлэх
        function handleCatch(player, type) {
            if (type === 'bomb') {
                // Бөмбөг авсан тоглогч шууд хожигдоно, нөгөөх нь хожно
                let winner = (player === 'Player 1') ? 'Тоглогч 2 (Цэнхэр)' : 'Тоглогч 1 (Ногоон)';
                endGame(winner, `${player} БӨМБӨГӨНД ОНОГДЛОО!`);
            } else {
                let points = (type === 'fruit-gold') ? 3 : 1;
                
                if (player === 'Player 1') {
                    p1Score += points;
                    p1ScoreDisplay.innerText = p1Score;
                } else {
                    p2Score += points;
                    p2ScoreDisplay.innerText = p2Score;
                }
            }
        }

        function endGame(winner, reason) {
            isGameOver = true;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            
            winnerText.innerText = `ЯЛАГЧ: ${winner} 🎉`;
            reasonText.innerText = reason;
            p1Final.innerText = p1Score;
            p2Final.innerText = p2Score;
            
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            objects.forEach(obj => obj.element.remove());
            objects = [];
            p1Score = 0;
            p2Score = 0;
            currentSpeed = baseSpeed;
            basket1X = 200;
            basket2X = 600;
            isGameOver = false;

            p1ScoreDisplay.innerText = 0;
            p2ScoreDisplay.innerText = 0;
            speedDisplay.innerText = 1;
            gameOverScreen.style.display = 'none';

            gameInterval = setInterval(updateGame, 1000 / 60);
            spawnInterval = setInterval(spawnObject, 550); // Жимс унах хугацааг 0.55 сек болгож хурдасгасан
        }

        resetGame();
    </script>
</body>
</html>
