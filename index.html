<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Төрлийн Жимстэй Тэмцэл</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-screen {
            position: relative;
            width: 1000px;
            height: 650px;
            border: 4px solid #fff;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            overflow: hidden;
            display: flex;
        }

        /* Талбарууд */
        .field-p1 {
            flex: 1;
            background: linear-gradient(to bottom, #114e36, #072217);
            position: relative;
            border-right: 2px dashed rgba(255, 255, 255, 0.3);
        }

        .field-p2 {
            flex: 1;
            background: linear-gradient(to bottom, #10375c, #0b1b2b);
            position: relative;
        }

        /* Сагснууд - Урт нь JavaScript дээр өөрчлөгдөнө */
        #basket1 {
            position: absolute;
            bottom: 20px;
            left: 200px;
            width: 90px;
            height: 20px;
            background: #2ecc71;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.4);
            transition: width 0.2s, background 0.2s;
        }

        #basket2 {
            position: absolute;
            bottom: 20px;
            left: 200px;
            width: 90px;
            height: 20px;
            background: #00adb5;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0, 173, 181, 0.4);
            transition: width 0.2s, background 0.2s;
        }

        /* Унах 5 төрлийн зүйлс */
        .falling-object {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .fruit-red { background: #ff4757; box-shadow: inset -4px -4px 6px rgba(0,0,0,0.4); } /* 1. Улаан */
        .fruit-yellow { background: #ffa502; border: 1px solid #fff; box-shadow: 0 0 10px #ffa502, inset -4px -4px 6px rgba(0,0,0,0.3); } /* 2. Шар */
        .fruit-blue { background: #3498db; border: 1px solid #fff; box-shadow: 0 0 10px #3498db, inset -4px -4px 6px rgba(0,0,0,0.3); } /* 3. Цэнхэр */
        .fruit-orange { background: #e67e22; border: 1px solid #fff; box-shadow: 0 0 10px #e67e22, inset -4px -4px 6px rgba(0,0,0,0.3); } /* 4. Улбар шар */
        .bomb { background: #2f3542; border: 2px solid #000; box-shadow: inset -4px -4px 6px rgba(255,255,255,0.2); } /* 5. Бөмбөг */

        /* UI Хэсэг */
        .ui-panel {
            position: absolute;
            top: 15px;
            left: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 5;
        }
        .ui-right { left: auto; right: 20px; text-align: right; }

        #speed-display {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #f1c40f;
            font-size: 22px;
            font-weight: bold;
            z-index: 5;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Overlay Цонхнууд */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 26, 0.95);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay-screen h1 { color: #f1c40f; font-size: 38px; margin-bottom: 20px; text-align: center; }
        
        .input-group { display: flex; gap: 20px; margin-bottom: 30px; }
        .input-box { display: flex; flex-direction: column; align-items: center; }
        .input-box label { font-size: 14px; color: #bbb; margin-bottom: 5px; }
        .input-box input {
            padding: 10px; font-size: 16px; border: 2px solid #555; border-radius: 5px;
            background: #222; color: white; text-align: center; width: 180px;
        }
        .input-box input:focus { border-color: #2ecc71; outline: none; }

        .btn {
            padding: 12px 35px; font-size: 18px; background: #2ecc71; color: white;
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.05); background: #27ae60; }

        .leaderboard {
            margin-top: 25px; width: 320px; background: rgba(255,255,255,0.05);
            padding: 15px; border-radius: 8px; border: 1px solid #333;
        }
        .leaderboard h3 { margin: 0 0 10px 0; text-align: center; color: #00adb5; font-size: 18px; }
        .score-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; font-size: 15px; }

        #reasonText { font-size: 18px; color: #bdc3c7; margin-bottom: 20px; }
        .final-scores { display: flex; gap: 60px; font-size: 24px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="speed-display">Түвшин: <span id="speed-level">1</span></div>

        <div class="field-p1" id="field-p1">
            <div class="ui-panel"><span id="p1-name-tag">P1</span>: <span id="p1-score">0</span></div>
            <div id="basket1"></div>
        </div>

        <div class="field-p2" id="field-p2">
            <div class="ui-panel ui-right"><span id="p2-name-tag">P2</span>: <span id="p2-score">0</span></div>
            <div id="basket2"></div>
        </div>

        <div id="start-screen" class="overlay-screen">
            <h1>ЖИМСНИЙ ТЭМЦЭЛ (5 ТӨРӨЛ)</h1>
            <div class="input-group">
                <div class="input-box">
                    <label>Тоглогч 1 (A/D)</label>
                    <input type="text" id="p1-input" value="Тоглогч 1" maxlength="10">
                </div>
                <div class="input-box">
                    <label>Тоглогч 2 (◀/▶)</label>
                    <input type="text" id="p2-input" value="Тоглогч 2" maxlength="10">
                </div>
            </div>
            <button class="btn" onclick="startGame()">Тоглоомыг Эхлүүлэх</button>
        </div>

        <div id="game-over-screen" class="overlay-screen" style="display: none;">
            <h1 id="winnerText">ЯЛАГЧ</h1>
            <div id="reasonText">Шалтгаан</div>
            
            <div class="final-scores">
                <div style="color: #2ecc71;"><span id="p1-lbl">P1</span>: <span id="p1-final">0</span></div>
                <div style="color: #00adb5;"><span id="p2-lbl">P2</span>: <span id="p2-final">0</span></div>
            </div>

            <button class="btn" onclick="resetGame()">Дахин тоглох</button>

            <div class="leaderboard">
                <h3>🏆 Шилдэг Амжилтууд</h3>
                <div id="leaderboard-content"></div>
            </div>
        </div>
    </div>

    <script>
        const field1 = document.getElementById('field-p1');
        const field2 = document.getElementById('field-p2');
        const basket1 = document.getElementById('basket1');
        const basket2 = document.getElementById('basket2');
        
        const p1ScoreDisplay = document.getElementById('p1-score');
        const p2ScoreDisplay = document.getElementById('p2-score');
        const speedDisplay = document.getElementById('speed-level');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        
        let p1Name = "Тоглогч 1";
        let p2Name = "Тоглогч 2";

        const fieldWidth = 500;
        const baseBasketWidth = 90;
        const largeBasketWidth = 140;
        const basketSpeed = 12;

        let p1Score = 0;
        let p2Score = 0;
        let baseSpeed = 3.5;
        let currentSpeed = 3.5;
        
        let basket1X = 200;
        let basket2X = 200;
        let basket1Width = baseBasketWidth;
        let basket2Width = baseBasketWidth;
        
        let p1PowerupTimeout;
        let p2PowerupTimeout;

        let objects = []; 
        let gameInterval;
        let spawnInterval;
        let isGameOver = false;

        let keys = { a: false, d: false, ArrowLeft: false, ArrowRight: false };

        document.addEventListener('keydown', (e) => {
            let key = e.key;
            if (key === 'A' || key === 'a') keys.a = true;
            if (key === 'D' || key === 'd') keys.d = true;
            if (key in keys) keys[key] = true;
        });

        document.addEventListener('keyup', (e) => {
            let key = e.key;
            if (key === 'A' || key === 'a') keys.a = false;
            if (key === 'D' || key === 'd') keys.d = false;
            if (key in keys) keys[key] = false;
        });

        function moveBaskets() {
            if (keys.a && basket1X > 0) basket1X -= basketSpeed;
            if (keys.d && basket1X < fieldWidth - basket1Width) basket1X += basketSpeed;
            basket1.style.left = basket1X + 'px';

            if (keys.ArrowLeft && basket2X > 0) basket2X -= basketSpeed;
            if (keys.ArrowRight && basket2X < fieldWidth - basket2Width) basket2X += basketSpeed;
            basket2.style.left = basket2X + 'px';
        }

        function startGame() {
            p1Name = document.getElementById('p1-input').value.trim() || "Тоглогч 1";
            p2Name = document.getElementById('p2-input').value.trim() || "Тоглогч 2";
            document.getElementById('p1-name-tag').innerText = p1Name;
            document.getElementById('p2-name-tag').innerText = p2Name;
            startScreen.style.display = 'none';
            resetGame();
        }

        // ХОЁР ТАЛБАРТ ТЭГШ ОБЪЕКТ ҮҮСГЭХ (5 ТӨРӨЛ)
        function spawnManager() {
            if (isGameOver) return;

            const rand = Math.random();
            let type = 'fruit-red';

            // Магадлалын хуваарилалт
            if (rand < 0.45) type = 'fruit-red';       // 45% Энгийн улаан
            else if (rand < 0.65) type = 'fruit-yellow'; // 20% Шар (+3 оноо)
            else if (rand < 0.75) type = 'fruit-blue';   // 10% Цэнхэр (Сагс томсгох)
            else if (rand < 0.82) type = 'fruit-orange'; // 7% Улбар шар (Бөмбөг устгах)
            else type = 'bomb';                          // 18% Бөмбөг

            const xPos = Math.floor(Math.random() * (fieldWidth - 30));

            // Зүүн талбар
            const obj1 = document.createElement('div');
            obj1.classList.add('falling-object', type);
            obj1.style.left = xPos + 'px';
            obj1.style.top = '0px';
            field1.appendChild(obj1);
            objects.push({ element: obj1, x: xPos, y: 0, type: type, field: 1 });

            // Баруун талбар
            const obj2 = document.createElement('div');
            obj2.classList.add('falling-object', type);
            obj2.style.left = xPos + 'px';
            obj2.style.top = '0px';
            field2.appendChild(obj2);
            objects.push({ element: obj2, x: xPos, y: 0, type: type, field: 2 });
        }

        function updateGame() {
            if (isGameOver) return;

            moveBaskets();

            let topScore = Math.max(p1Score, p2Score);
            currentSpeed = baseSpeed + Math.floor(topScore / 5);
            speedDisplay.innerText = Math.floor(topScore / 5) + 1;

            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                obj.y += currentSpeed;
                obj.element.style.top = obj.y + 'px';

                if (obj.y >= 595 && obj.y <= 615) {
                    // Тоглогч 1 шалгах
                    if (obj.field === 1 && obj.x + 30 >= basket1X && obj.x <= basket1X + basket1Width) {
                        handleCatch(1, obj.type);
                        obj.element.remove();
                        objects.splice(i, i);
                        objects = objects.filter(o => o.element !== obj.element);
                        continue;
                    }
                    // Тоглогч 2 шалгах
                    if (obj.field === 2 && obj.x + 30 >= basket2X && obj.x <= basket2X + basketWidth) {
                        handleCatch(2, obj.type);
                        obj.element.remove();
                        objects = objects.filter(o => o.element !== obj.element);
                        continue;
                    }
                }

                if (obj.y > 650) {
                    obj.element.remove();
                    objects.splice(i, 1);
                }
            }
        }

        // ЖИМС БАРИХ ЛОГИК (5 ӨӨР ҮЙЛДЭЛ)
        function handleCatch(playerNum, type) {
            if (playerNum === 1) {
                if (type === 'fruit-red') {
                    p1Score += 1;
                } else if (type === 'fruit-yellow') {
                    p1Score += 3;
                } else if (type === 'fruit-blue') {
                    // Цэнхэр: Сагсыг томсгоно (5 секунд)
                    basket1Width = largeBasketWidth;
                    basket1.style.width = basket1Width + 'px';
                    basket1.style.background = '#3498db';
                    clearTimeout(p1PowerupTimeout);
                    p1PowerupTimeout = setTimeout(() => {
                        basket1Width = baseBasketWidth;
                        basket1.style.width = basket1Width + 'px';
                        basket1.style.background = '#2ecc71';
                    }, 5000);
                } else if (type === 'fruit-orange') {
                    // Улбар шар: Зүүн талбарын бүх бөмбөгийг буудаж устгана
                    shootBombs(1);
                } else if (type === 'bomb') {
                    // Бөмбөг: Хэрэв том байвал жижиг болгоно, жижиг байвал хожигдоно
                    if (basket1Width === largeBasketWidth) {
                        clearTimeout(p1PowerupTimeout);
                        basket1Width = baseBasketWidth;
                        basket1.style.width = basket1Width + 'px';
                        basket1.style.background = '#2ecc71';
                    } else {
                        endGame(p2Name, `${p1Name} бөмбөгөнд дэлбэрлээ! 💥`);
                    }
                }
                p1ScoreDisplay.innerText = p1Score;
            } else {
                // Тоглогч 2-ын логик
                if (type === 'fruit-red') {
                    p2Score += 1;
                } else if (type === 'fruit-yellow') {
                    p2Score += 3;
                } else if (type === 'fruit-blue') {
                    basket2Width = largeBasketWidth;
                    basket2.style.width = basket2Width + 'px';
                    basket2.style.background = '#3498db';
                    clearTimeout(p2PowerupTimeout);
                    p2PowerupTimeout = setTimeout(() => {
                        basket2Width = baseBasketWidth;
                        basket2.style.width = basket2Width + 'px';
                        basket2.style.background = '#00adb5';
                    }, 5000);
                } else if (type === 'fruit-orange') {
                    shootBombs(2);
                } else if (type === 'bomb') {
                    if (basket2Width === largeBasketWidth) {
                        clearTimeout(p2PowerupTimeout);
                        basket2Width = baseBasketWidth;
                        basket2.style.width = basket2Width + 'px';
                        basket2.style.background = '#00adb5';
                    } else {
                        endGame(p1Name, `${p2Name} бөмбөгөнд дэлбэрлээ! 💥`);
                    }
                }
                p2ScoreDisplay.innerText = p2Score;
            }
        }

        // Улбар шар жимсний бөмбөг буудах функц
        function shootBombs(fieldNum) {
            for (let i = objects.length - 1; i >= 0; i--) {
                if (objects[i].field === fieldNum && objects[i].type === 'bomb') {
                    objects[i].element.remove();
                    objects.splice(i, 1);
                }
            }
        }

        function saveScores() {
            let scores = JSON.parse(localStorage.getItem('fruitGameScores')) || [];
            scores.push({ name: p1Name, score: p1Score });
            scores.push({ name: p2Name, score: p2Score });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 5);
            localStorage.setItem('fruitGameScores', JSON.stringify(scores));
            displayLeaderboard();
        }

        function displayLeaderboard() {
            let scores = JSON.parse(localStorage.getItem('fruitGameScores')) || [];
            const container = document.getElementById('leaderboard-content');
            container.innerHTML = '';
            if (scores.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#777;">Амжилт хараахан байхгүй</div>';
                return;
            }
            scores.forEach((item, index) => {
                container.innerHTML += `
                    <div class="score-row">
                        <span>${index + 1}. ${item.name}</span>
                        <span style="color:#f1c40f; font-weight:bold;">${item.score} онoo</span>
                    </div>`;
            });
        }

        function endGame(winner, reason) {
            isGameOver = true;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            clearTimeout(p1PowerupTimeout);
            clearTimeout(p2PowerupTimeout);
            
            document.getElementById('winnerText').innerText = `ЯЛАГЧ: ${winner} 🎉`;
            document.getElementById('reasonText').innerText = reason;
            
            document.getElementById('p1-lbl').innerText = p1Name;
            document.getElementById('p2-lbl').innerText = p2Name;
            document.getElementById('p1-final').innerText = p1Score;
            document.getElementById('p2-final').innerText = p2Score;
            
            saveScores();
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            objects.forEach(obj => obj.element.remove());
            objects = [];
            p1Score = 0;
            p2Score = 0;
            currentSpeed = baseSpeed;
            basket1X = 200;
            basket2X = 200;
            basket1Width = baseBasketWidth;
            basket2Width = baseBasketWidth;
            basket1.style.width = basket1Width + 'px';
            basket2.style.width = basket2Width + 'px';
            basket1.style.background = '#2ecc71';
            basket2.style.background = '#00adb5';
            isGameOver = false;

            p1ScoreDisplay.innerText = 0;
            p2ScoreDisplay.innerText = 0;
            speedDisplay.innerText = 1;
            gameOverScreen.style.display = 'none';

            gameInterval = setInterval(updateGame, 1000 / 60);
            spawnInterval = setInterval(spawnManager, 600);
        }
    </script>
</body>
</html>
