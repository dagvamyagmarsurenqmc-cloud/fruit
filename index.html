<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Battle: Fruit Rain Mode</title>
    <style>
        :root {
            --p1-color: #00ff88;
            --p2-color: #00d2ff;
            --gold-color: #ffd32a;
            --bg-dark: #0a0e17;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1e272e 0%, #0a0e17 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-screen {
            position: relative;
            width: 1000px;
            height: 650px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 30px rgba(0, 210, 255, 0.1);
            overflow: hidden;
            display: flex;
        }

        /* Талбарууд */
        .field {
            flex: 1;
            position: relative;
            transition: background 0.3s;
        }

        .field-p1 {
            background: linear-gradient(180deg, rgba(0, 255, 136, 0.03) 0%, rgba(0,0,0,0) 100%);
            border-right: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .field-p2 {
            background: linear-gradient(180deg, rgba(0, 210, 255, 0.03) 0%, rgba(0,0,0,0) 100%);
        }

        /* Сагснууд */
        .basket {
            position: absolute;
            bottom: 30px;
            height: 16px;
            border-radius: 20px;
            transition: width 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
        }

        #basket1 {
            background: linear-gradient(90deg, #00ff88, #00b358);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.6);
        }

        #basket2 {
            background: linear-gradient(90deg, #00d2ff, #0086b3);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
        }

        /* УНАХ БОДИТ ЖИМСНҮҮД */
        .falling-object {
            position: absolute;
            width: 35px;
            height: 35px;
            font-size: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 4px 8px rgba(0,0,0,0.4);
            z-index: 2;
        }

        /* UI Хэсэг */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 25px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            z-index: 5;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .ui-panel span { font-weight: 800; font-size: 22px; }
        .p1-text { color: var(--p1-color); }
        .p2-text { color: var(--p2-color); }
        .ui-right { left: auto; right: 25px; text-align: right; }

        #speed-display {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--gold-color);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 5;
            background: rgba(255, 211, 42, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 211, 42, 0.2);
            text-transform: uppercase;
        }

        /* Overlay Дэлгэцүүд */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 23, 0.94);
            backdrop-filter: blur(15px);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay-screen h1 {
            font-size: 46px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 35px;
            text-align: center;
            background: linear-gradient(45deg, #00d2ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .input-group { display: flex; gap: 30px; margin-bottom: 35px; }
        .input-box { display: flex; flex-direction: column; align-items: center; }
        .input-box label { font-size: 13px; color: #8af; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-box input {
            padding: 14px 20px; font-size: 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            background: rgba(255,255,255,0.05); color: white; text-align: center; width: 180px;
            transition: all 0.3s;
        }
        .input-box input:focus { border-color: var(--p2-color); background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); outline: none; }

        .btn {
            padding: 14px 45px; font-size: 16px; background: linear-gradient(135deg, #00d2ff 0%, #00ff88 100%);
            color: #0a0e17; border: none; border-radius: 12px; cursor: pointer; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 255, 136, 0.4); }
        .btn:active { transform: translateY(-1px); }

        .leaderboard {
            margin-top: 30px; width: 340px; background: rgba(255,255,255,0.02);
            padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
        }
        .leaderboard h3 { margin: 0 0 15px 0; text-align: center; color: var(--p2-color); font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }
        .score-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; color: #ccc; }

        #winnerText { font-size: 36px; color: #fff; margin-bottom: 10px; font-weight: 800; }
        #reasonText { font-size: 16px; color: #a4b0be; margin-bottom: 25px; }
        .final-scores { display: flex; gap: 60px; font-size: 20px; margin-bottom: 30px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="speed-display">Level: <span id="speed-level">1</span></div>

        <!-- ЗҮҮН ТАЛБАР -->
        <div class="field field-p1" id="field-p1">
            <div class="ui-panel"><span id="p1-name-tag" class="p1-text">P1</span>: <span id="p1-score">0</span></div>
            <div id="basket1" class="basket"></div>
        </div>

        <!-- БАРУУН ТАЛБАР -->
        <div class="field field-p2" id="field-p2">
            <div class="ui-panel ui-right"><span id="p2-name-tag" class="p2-text">P2</span>: <span id="p2-score">0</span></div>
            <div id="basket2" class="basket"></div>
        </div>

        <!-- 1. НЭР ОРУУЛАХ ЦОНХ -->
        <div id="start-screen" class="overlay-screen">
            <h1>FRUIT BATTLE</h1>
            <div class="input-group">
                <div class="input-box">
                    <label>Player 1 (A / D)</label>
                    <input type="text" id="p1-input" value="Player 1" maxlength="10">
                </div>
                <div class="input-box">
                    <label>Player 2 (◀ / ▶)</label>
                    <input type="text" id="p2-input" value="Player 2" maxlength="10">
                </div>
            </div>
            <button class="btn" onclick="startGame()">Start Game</button>
        </div>

        <!-- 2. GAME OVER ЦОНХ -->
        <div id="game-over-screen" class="overlay-screen" style="display: none;">
            <div id="winnerText">WINNER</div>
            <div id="reasonText">Reason</div>
            
            <div class="final-scores">
                <div><span id="p1-lbl" class="p1-text">P1</span>: <span id="p1-final">0</span></div>
                <div><span id="p2-lbl" class="p2-text">P2</span>: <span id="p2-final">0</span></div>
            </div>

            <button class="btn" onclick="resetGame()">Play Again</button>

            <div class="leaderboard">
                <h3>🏆 Leaderboard</h3>
                <div id="leaderboard-content"></div>
            </div>
        </div>
    </div>

    <script>
        const field1 = document.getElementById('field-p1');
        const field2 = document.getElementById('field-p2');
        const basket1 = document.getElementById('basket1');
        const basket2 = document.getElementById('basket2');
        
        const p1ScoreDisplay = document.getElementById('p1-score');
        const p2ScoreDisplay = document.getElementById('p2-score');
        const speedDisplay = document.getElementById('speed-level');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        
        let p1Name = "Player 1";
        let p2Name = "Player 2";

        const fieldWidth = 500;
        const baseBasketWidth = 90;
        const largeBasketWidth = 140;
        const basketSpeed = 14; // Сагсны хурдыг бага зэрэг нэмэв (Олон жимс ирэх тул)

        let p1Score = 0;
        let p2Score = 0;
        let baseSpeed = 3.5;
        let currentSpeed = 3.5;
        
        let basket1X = 200;
        let basket2X = 200;
        let basket1Width = baseBasketWidth;
        let basket2Width = baseBasketWidth;
        
        let p1PowerupTimeout;
        let p2PowerupTimeout;

        let objects = []; 
        let gameInterval;
        let spawnInterval;
        let isGameOver = false;

        let keys = { a: false, d: false, ArrowLeft: false, ArrowRight: false };

        const fruitTypes = {
            apple: '🍎',
            banana: '🍌',
            grapes: '🍇',
            orange: '🍊',
            bomb: '💩'
        };

        document.addEventListener('keydown', (e) => {
            let key = e.key;
            if (key === 'A' || key === 'a') keys.a = true;
            if (key === 'D' || key === 'd') keys.d = true;
            if (key in keys) keys[key] = true;
        });

        document.addEventListener('keyup', (e) => {
            let key = e.key;
            if (key === 'A' || key === 'a') keys.a = false;
            if (key === 'D' || key === 'd') keys.d = false;
            if (key in keys) keys[key] = false;
        });

        function moveBaskets() {
            if (keys.a && basket1X > 0) basket1X -= basketSpeed;
            if (keys.d && basket1X < fieldWidth - basket1Width) basket1X += basketSpeed;
            basket1.style.left = basket1X + 'px';

            if (keys.ArrowLeft && basket2X > 0) basket2X -= basketSpeed;
            if (keys.ArrowRight && basket2X < fieldWidth - basket2Width) basket2X += basketSpeed;
            basket2.style.left = basket2X + 'px';
        }

        function startGame() {
            p1Name = document.getElementById('p1-input').value.trim() || "Player 1";
            p2Name = document.getElementById('p2-input').value.trim() || "Player 2";
            document.getElementById('p1-name-tag').innerText = p1Name;
            document.getElementById('p2-name-tag').innerText = p2Name;
            startScreen.style.display = 'none';
            resetGame();
        }

        // ШИНЭЧЛЭГДСЭН: Олноор нь үүсгэдэг функц
        function spawnManager() {
            if (isGameOver) return;

            // Санамсаргүй байдлаар нэг удаад 1-ээс 3 жимс зэрэг үүснэ
            const spawnCount = Math.floor(Math.random() * 3) + 1; 

            for (let k = 0; k < spawnCount; k++) {
                const rand = Math.random();
                let type = 'apple';

                if (rand < 0.45) type = 'apple';       
                else if (rand < 0.65) type = 'banana'; 
                else if (rand < 0.75) type = 'grapes';   
                else if (rand < 0.85) type = 'orange'; // Олон жимсэн дунд бөмбөг арай багасгав
                else type = 'bomb';                          

                // Жимснүүд давхцахгүй байх үүднээс санамсаргүй X байрлал
                const xPos = Math.floor(Math.random() * (fieldWidth - 35));
                // Зэрэг унахдаа яг ижил өндрөөс биш бага зэрэг зөрүүтэй унана
                const yOffset = -Math.floor(Math.random() * 40); 

                // Зүүн талбар
                const obj1 = document.createElement('div');
                obj1.classList.add('falling-object');
                obj1.innerText = fruitTypes[type];
                obj1.style.left = xPos + 'px';
                obj1.style.top = yOffset + 'px';
                field1.appendChild(obj1);
                objects.push({ element: obj1, x: xPos, y: yOffset, type: type, field: 1 });

                // Баруун талбар
                const obj2 = document.createElement('div');
                obj2.classList.add('falling-object');
                obj2.innerText = fruitTypes[type];
                obj2.style.left = xPos + 'px';
                obj2.style.top = yOffset + 'px';
                field2.appendChild(obj2);
                objects.push({ element: obj2, x: xPos, y: yOffset, type: type, field: 2 });
            }
        }

        function updateGame() {
            if (isGameOver) return;

            moveBaskets();

            let topScore = Math.max(p1Score, p2Score);
            currentSpeed = baseSpeed + Math.floor(topScore / 7); // Олон жимстэй тул хурд нэмэгдэлтийг арай зөөлрүүлэв
            speedDisplay.innerText = Math.floor(topScore / 7) + 1;

            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                obj.y += currentSpeed;
                obj.element.style.top = obj.y + 'px';

                if (obj.y >= 585 && obj.y <= 610) {
                    if (obj.field === 1 && obj.x + 35 >= basket1X && obj.x <= basket1X + basket1Width) {
                        handleCatch(1, obj.type);
                        obj.element.remove();
                        objects.splice(i, 1);
                        continue;
                    }
                    if (obj.field === 2 && obj.x + 35 >= basket2X && obj.x <= basket2X + basket2Width) {
                        handleCatch(2, obj.type);
                        obj.element.remove();
                        objects.splice(i, 1);
                        continue;
                    }
                }

                if (obj.y > 650) {
                    obj.element.remove();
                    objects.splice(i, 1);
                }
            }
        }

        function handleCatch(playerNum, type) {
            if (playerNum === 1) {
                if (type === 'apple') p1Score += 1;
                else if (type === 'banana') p1Score += 3;
                else if (type === 'grapes') {
                    basket1Width = largeBasketWidth;
                    basket1.style.width = basket1Width + 'px';
                    basket1.style.background = 'linear-gradient(90deg, #a55eea, #8854d0)';
                    clearTimeout(p1PowerupTimeout);
                    p1PowerupTimeout = setTimeout(() => {
                        basket1Width = baseBasketWidth;
                        basket1.style.width = basket1Width + 'px';
                        basket1.style.background = 'linear-gradient(90deg, #00ff88, #00b358)';
                    }, 5000);
                } else if (type === 'orange') {
                    shootBombs(1);
                } else if (type === 'bomb') {
                    if (basket1Width === largeBasketWidth) {
                        clearTimeout(p1PowerupTimeout);
                        basket1Width = baseBasketWidth;
                        basket1.style.width = basket1Width + 'px';
                        basket1.style.background = 'linear-gradient(90deg, #00ff88, #00b358)';
                    } else {
                        endGame(p2Name, `${p1Name} бөмбөгөнд дэлбэрлээ! 💥`);
                    }
                }
                p1ScoreDisplay.innerText = p1Score;
            } else {
                if (type === 'apple') p2Score += 1;
                else if (type === 'banana') p2Score += 3;
                else if (type === 'grapes') {
                    basket2Width = largeBasketWidth;
                    basket2.style.width = basket2Width + 'px';
                    basket2.style.background = 'linear-gradient(90deg, #a55eea, #8854d0)';
                    clearTimeout(p2PowerupTimeout);
                    p2PowerupTimeout = setTimeout(() => {
                        basket2Width = baseBasketWidth;
                        basket2.style.width = basket2Width + 'px';
                        basket2.style.background = 'linear-gradient(90deg, #00d2ff, #0086b3)';
                    }, 5000);
                } else if (type === 'orange') {
                    shootBombs(2);
                } else if (type === 'bomb') {
                    if (basket2Width === largeBasketWidth) {
                        clearTimeout(p2PowerupTimeout);
                        basket2Width = baseBasketWidth;
                        basket2.style.width = basket2Width + 'px';
                        basket2.style.background = 'linear-gradient(90deg, #00d2ff, #0086b3)';
                    } else {
                        endGame(p1Name, `${p2Name} бөмбөгөнд дэлбэрлээ! 💥`);
                    }
                }
                p2ScoreDisplay.innerText = p2Score;
            }
        }

        function shootBombs(fieldNum) {
            for (let i = objects.length - 1; i >= 0; i--) {
                if (objects[i].field === fieldNum && objects[i].type === 'bomb') {
                    objects[i].element.remove();
                    objects.splice(i, 1);
                }
            }
        }

        function saveScores() {
            let scores = JSON.parse(localStorage.getItem('fruitGameScores')) || [];
            scores.push({ name: p1Name, score: p1Score });
            scores.push({ name: p2Name, score: p2Score });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 5);
            localStorage.setItem('fruitGameScores', JSON.stringify(scores));
            displayLeaderboard();
        }

        function displayLeaderboard() {
            let scores = JSON.parse(localStorage.getItem('fruitGameScores')) || [];
            const container = document.getElementById('leaderboard-content');
            container.innerHTML = '';
            if (scores.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#777;">No records yet</div>';
                return;
            }
            scores.forEach((item, index) => {
                container.innerHTML += `
                    <div class="score-row">
                        <span>${index + 1}. ${item.name}</span>
                        <span style="color:var(--gold-color); font-weight:bold;">${item.score} pts</span>
                    </div>`;
            });
        }

        function endGame(winner, reason) {
            isGameOver = true;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            clearTimeout(p1PowerupTimeout);
            clearTimeout(p2PowerupTimeout);
            
            document.getElementById('winnerText').innerText = `🏆 WINNER: ${winner}`;
            document.getElementById('reasonText').innerText = reason;
            
            document.getElementById('p1-lbl').innerText = p1Name;
            document.getElementById('p2-lbl').innerText = p2Name;
            document.getElementById('p1-final').innerText = p1Score;
            document.getElementById('p2-final').innerText = p2Score;
            
            saveScores();
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            objects.forEach(obj => obj.element.remove());
            objects = [];
            p1Score = 0;
            p2Score = 0;
            currentSpeed = baseSpeed;
            basket1X = 200;
            basket2X = 200;
            basket1Width = baseBasketWidth;
            basket2Width = baseBasketWidth;
            basket1.style.width = basket1Width + 'px';
            basket2.style.width = basket2Width + 'px';
            basket1.style.background = 'linear-gradient(90deg, #00ff88, #00b358)';
            basket2.style.background = 'linear-gradient(90deg, #00d2ff, #0086b3)';
            isGameOver = false;

            p1ScoreDisplay.innerText = 0;
            p2ScoreDisplay.innerText = 0;
            speedDisplay.innerText = 1;
            gameOverScreen.style.display = 'none';

            gameInterval = setInterval(updateGame, 1000 / 60);
            // ШИНЭЧЛЭГДСЭН: Жимс унах давтамжийг 350ms болгож маш хурдан болгов
            spawnInterval = setInterval(spawnManager, 350); 
        }
    </script>
</body>
</html>
